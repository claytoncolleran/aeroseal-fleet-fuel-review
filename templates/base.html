<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Fuel Review{% endblock %} — Aeroseal Fleet</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/lucide-static@latest/font/lucide.css" rel="stylesheet">
  <style>
    /* ─── Aeroseal Brand Tokens ─── */
    :root {
      --aeroseal-steel-blue: #005A90;
      --aeroseal-sapphire: #008CD1;
      --aeroseal-sky-blue: #51BDE7;
      --aeroseal-citrus-green: #C9DC50;
      --aeroseal-midnight-blue: #113C5B;
      --aeroseal-titanium: #CBD0D4;
      --font-primary: 'Figtree', Arial, sans-serif;
      --gradient-blue-core: linear-gradient(135deg, #005A90, #008CD1, #51BDE7);
      --gradient-sky-to-steel: linear-gradient(135deg, #51BDE7, #005A90);
      --shadow-sm: 0 2px 8px rgba(17, 60, 91, 0.08);
      --shadow-md: 0 4px 16px rgba(17, 60, 91, 0.10);
      --shadow-lg: 0 8px 24px rgba(17, 60, 91, 0.12);
      --radius: 8px;
    }

    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-primary);
      font-size: 15px;
      color: var(--aeroseal-midnight-blue);
      background: #F3F5F7;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--aeroseal-sapphire); text-decoration: none; transition: color 0.2s; }
    a:hover { color: var(--aeroseal-steel-blue); }

    /* ─── Header ─── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(203,208,212,0.5);
    }
    .header-inner {
      max-width: 1280px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px; padding: 0 24px;
    }
    .header-brand {
      display: flex; align-items: center; gap: 12px;
      font-weight: 700; font-size: 18px; color: var(--aeroseal-steel-blue);
    }
    .header-brand svg { width: 24px; height: 24px; }
    .header-nav { display: flex; gap: 8px; }
    .header-nav a {
      font-weight: 500; font-size: 14px;
      color: var(--aeroseal-midnight-blue);
      padding: 6px 14px; border-radius: 6px;
      transition: all 0.2s;
    }
    .header-nav a:hover, .header-nav a.active {
      background: rgba(0,140,209,0.08); color: var(--aeroseal-sapphire);
    }

    /* ─── Layout ─── */
    .container { max-width: 1280px; margin: 0 auto; padding: 24px; }
    .page-header {
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--aeroseal-sapphire);
    }
    .page-header h1 {
      font-size: 26px; font-weight: 700;
      color: var(--aeroseal-steel-blue);
    }
    .page-header p { color: #5A6B7B; font-size: 14px; margin-top: 4px; }

    /* ─── Stat Cards ─── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px; margin-bottom: 24px;
    }
    .stat-card {
      background: #fff; border-radius: var(--radius);
      box-shadow: var(--shadow-sm); padding: 20px;
      text-align: center;
      border-top: 3px solid var(--aeroseal-sapphire);
    }
    .stat-card.accent { border-top-color: var(--aeroseal-citrus-green); }
    .stat-card.warn { border-top-color: #E8672A; }
    .stat-number {
      font-size: 32px; font-weight: 700;
      color: var(--aeroseal-sapphire); line-height: 1.1;
    }
    .stat-card.accent .stat-number { color: #6B8C22; }
    .stat-card.warn .stat-number { color: #E8672A; }
    .stat-label {
      font-size: 12px; font-weight: 600;
      color: var(--aeroseal-titanium);
      text-transform: uppercase; letter-spacing: 0.05em;
      margin-top: 4px;
    }

    /* ─── Cards / Sections ─── */
    .card {
      background: #fff; border-radius: var(--radius);
      box-shadow: var(--shadow-sm); margin-bottom: 16px;
      overflow: hidden;
    }

    /* ─── Collapsible Group Sections ─── */
    .group-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; cursor: pointer;
      background: #fff; transition: background 0.2s;
      user-select: none;
    }
    .group-header:hover { background: #F8FAFB; }
    .group-header h2 {
      font-size: 17px; font-weight: 600;
      color: var(--aeroseal-midnight-blue);
      display: flex; align-items: center; gap: 10px;
    }
    .group-meta {
      display: flex; gap: 16px; font-size: 13px; color: #5A6B7B;
    }
    .group-meta span { display: flex; align-items: center; gap: 4px; }
    .group-body { display: none; padding: 0 20px 20px; }
    .group-body.open { display: block; }
    .chevron {
      width: 20px; height: 20px;
      transition: transform 0.2s;
      color: var(--aeroseal-titanium);
    }
    .chevron.open { transform: rotate(90deg); }

    /* ─── Vehicle Section ─── */
    .vehicle-section {
      margin-bottom: 16px; border: 1px solid #E8ECF0;
      border-radius: 6px; overflow: hidden;
    }
    .vehicle-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; background: #F8FAFB;
      cursor: pointer; user-select: none;
    }
    .vehicle-header:hover { background: #F0F4F7; }
    .vehicle-header h3 {
      font-size: 15px; font-weight: 600;
      color: var(--aeroseal-midnight-blue);
    }
    .vehicle-body { display: none; }
    .vehicle-body.open { display: block; }

    .mpg-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 12px;
      font-size: 12px; font-weight: 600;
    }
    .mpg-good { background: #E8F5E9; color: #2E7D32; }
    .mpg-ok { background: #FFF8E1; color: #F57F17; }
    .mpg-bad { background: #FFEBEE; color: #C62828; }

    /* ─── Transaction Table ─── */
    .txn-table {
      width: 100%; border-collapse: collapse; font-size: 13px;
    }
    .txn-table thead { background: var(--aeroseal-midnight-blue); }
    .txn-table th {
      padding: 10px 12px; text-align: left;
      color: #fff; font-weight: 600; font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .txn-table td {
      padding: 10px 12px; border-bottom: 1px solid #F0F2F4;
      vertical-align: top;
    }
    .txn-table tr:last-child td { border-bottom: none; }
    .txn-table tr.flagged { background: #FFF8F0; }
    .txn-table tr:hover { background: #F5F8FB; }
    .txn-table tr.flagged:hover { background: #FFF3E6; }

    /* ─── Flag Badges ─── */
    .flag-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 4px;
      font-size: 11px; font-weight: 600;
      margin: 2px 2px 2px 0; white-space: nowrap;
    }
    .flag-1 { background: #FFEBEE; color: #C62828; }
    .flag-2 { background: #FFF3E0; color: #E65100; }
    .flag-3 { background: #E3F2FD; color: #1565C0; }
    .flag-4 { background: #F3E5F5; color: #6A1B9A; }
    .flag-5 { background: #FFF8E1; color: #F57F17; }
    .flag-6 { background: #FCE4EC; color: #AD1457; }

    .flag-detail {
      font-size: 12px; color: #5A6B7B;
      margin-top: 4px; line-height: 1.4;
      padding: 6px 8px; background: #F8F9FA;
      border-radius: 4px; border-left: 3px solid;
    }
    .flag-detail.flag-1-detail { border-color: #C62828; }
    .flag-detail.flag-2-detail { border-color: #E65100; }
    .flag-detail.flag-3-detail { border-color: #1565C0; }
    .flag-detail.flag-4-detail { border-color: #6A1B9A; }
    .flag-detail.flag-5-detail { border-color: #F57F17; }
    .flag-detail.flag-6-detail { border-color: #AD1457; }

    /* ─── Approve/Deny Buttons ─── */
    .decision-row {
      display: flex; gap: 8px; align-items: center;
      margin-top: 8px;
    }
    .btn {
      font-family: var(--font-primary); font-weight: 600;
      font-size: 12px; padding: 6px 16px;
      border-radius: 6px; border: none; cursor: pointer;
      transition: all 0.2s; letter-spacing: 0.02em;
    }
    .btn-approve {
      background: var(--aeroseal-sapphire); color: #fff;
    }
    .btn-approve:hover { background: var(--aeroseal-steel-blue); }
    .btn-approve.selected { background: #2E7D32; }
    .btn-deny {
      background: transparent; color: #C62828;
      border: 1.5px solid #C62828;
    }
    .btn-deny:hover { background: #FFEBEE; }
    .btn-deny.selected { background: #C62828; color: #fff; }
    .btn-submit {
      background: var(--aeroseal-sapphire); color: #fff;
      font-size: 15px; padding: 12px 32px;
      border-radius: 6px; border: none; cursor: pointer;
      font-weight: 600; letter-spacing: 0.03em;
      transition: all 0.2s;
    }
    .btn-submit:hover { background: var(--aeroseal-steel-blue); transform: scale(1.02); }
    .btn-submit:disabled {
      background: var(--aeroseal-titanium); cursor: not-allowed; transform: none;
    }

    .deny-reason {
      font-family: var(--font-primary); font-size: 13px;
      padding: 8px 12px; border: 1px solid var(--aeroseal-titanium);
      border-radius: 6px; width: 280px; display: none;
    }
    .deny-reason:focus {
      outline: none; border-color: var(--aeroseal-sapphire);
      box-shadow: 0 0 0 3px rgba(0,140,209,0.15);
    }
    .deny-reason.visible { display: block; }

    .decision-status {
      font-size: 12px; font-weight: 600; padding: 4px 10px;
      border-radius: 4px;
    }
    .decision-approved { background: #E8F5E9; color: #2E7D32; }
    .decision-denied { background: #FFEBEE; color: #C62828; }

    /* ─── Special Sections ─── */
    .section-label {
      display: flex; align-items: center; gap: 8px;
      font-size: 14px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.05em;
      color: var(--aeroseal-steel-blue);
      padding: 12px 0; margin-top: 8px;
    }
    .section-label .section-icon {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: #fff;
    }
    .section-label .temp-icon { background: #F57F17; }
    .section-label .declined-icon { background: #C62828; }

    .section-banner {
      padding: 12px 16px; border-radius: 6px;
      font-size: 13px; margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .banner-info { background: #E3F2FD; color: #1565C0; border-left: 3px solid #1565C0; }
    .banner-warn { background: #FFF3E0; color: #E65100; border-left: 3px solid #E65100; }
    .banner-temp { background: #FFF8E1; color: #F57F17; border-left: 3px solid #F57F17; }

    /* ─── Submit Bar ─── */
    .submit-bar {
      position: sticky; bottom: 0;
      background: #fff; border-top: 2px solid var(--aeroseal-sapphire);
      padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 -4px 16px rgba(17,60,91,0.08);
    }
    .submit-progress {
      font-size: 14px; color: #5A6B7B;
    }
    .submit-progress strong { color: var(--aeroseal-sapphire); }

    /* ─── Admin ─── */
    .group-status-card {
      background: #fff; border-radius: var(--radius);
      box-shadow: var(--shadow-sm); padding: 20px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px; transition: all 0.2s;
      border-left: 4px solid var(--aeroseal-titanium);
    }
    .group-status-card.submitted { border-left-color: var(--aeroseal-citrus-green); }
    .group-status-card.pending { border-left-color: #F57F17; }
    .status-badge {
      padding: 4px 12px; border-radius: 12px;
      font-size: 12px; font-weight: 600;
    }
    .status-submitted { background: #E8F5E9; color: #2E7D32; }
    .status-pending { background: #FFF8E1; color: #F57F17; }

    /* ─── Responsive ─── */
    @media (max-width: 768px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .group-meta { flex-wrap: wrap; }
      .txn-table { font-size: 12px; }
      .txn-table th, .txn-table td { padding: 8px 6px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#005A90" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 22V5a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v17"/><path d="M3 22h10"/><path d="M13 10h2a2 2 0 0 1 2 2v4a2 2 0 0 0 2 2 2 2 0 0 0 2-2V9.83a2 2 0 0 0-.59-1.42L18 6"/><path d="M6 12h4"/><path d="M6 8h4"/></svg>
        Aeroseal Fuel Review
      </div>
      <nav class="header-nav">
        <a href="/" class="{% if request.path == '/' %}active{% endif %}">Dashboard</a>
        {% if current_user and current_user.role == 'admin' %}
        <a href="/admin" class="{% if request.path == '/admin' %}active{% endif %}">Admin</a>
        <a href="/admin/reviews" class="{% if '/reviews' in request.path %}active{% endif %}">Reviews</a>
        <a href="/admin/users" class="{% if '/users' in request.path %}active{% endif %}">Users</a>
        <a href="/admin/settings" class="{% if '/settings' in request.path %}active{% endif %}">Settings</a>
        {% endif %}
        {% if current_user %}
        <span style="font-size: 13px; color: #5A6B7B; padding: 6px 8px;">{{ current_user.display_name }}</span>
        <a href="/logout" style="font-size: 13px; color: #999;">Logout</a>
        {% endif %}
      </nav>
    </div>
  </header>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
