<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Up Your Account — Aeroseal Fuel Review</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --aeroseal-steel-blue: #005A90;
      --aeroseal-sapphire: #008CD1;
      --aeroseal-midnight-blue: #113C5B;
      --aeroseal-titanium: #CBD0D4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Figtree', Arial, sans-serif;
      background: linear-gradient(135deg, #113C5B 0%, #005A90 50%, #008CD1 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.2);
      width: 400px; max-width: 90vw;
      padding: 40px;
    }
    .login-header {
      text-align: center; margin-bottom: 32px;
    }
    .login-header h1 {
      font-size: 22px; font-weight: 700;
      color: var(--aeroseal-steel-blue);
    }
    .login-header p {
      font-size: 14px; color: #5A6B7B; margin-top: 4px;
    }
    .form-group { margin-bottom: 20px; }
    .form-label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--aeroseal-midnight-blue);
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%; font-family: 'Figtree', Arial, sans-serif;
      font-size: 15px; padding: 12px 16px;
      border: 1px solid var(--aeroseal-titanium);
      border-radius: 6px; color: var(--aeroseal-midnight-blue);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus {
      outline: none;
      border-color: var(--aeroseal-sapphire);
      box-shadow: 0 0 0 3px rgba(0,140,209,0.15);
    }
    .btn-login {
      width: 100%; padding: 14px;
      background: var(--aeroseal-sapphire); color: #fff;
      font-family: 'Figtree', Arial, sans-serif;
      font-size: 15px; font-weight: 600;
      border: none; border-radius: 6px;
      cursor: pointer; transition: background 0.2s, transform 0.2s;
    }
    .btn-login:hover { background: var(--aeroseal-steel-blue); transform: scale(1.01); }
    .error-msg {
      background: #FFEBEE; color: #C62828;
      padding: 10px 14px; border-radius: 6px;
      font-size: 13px; font-weight: 500;
      margin-bottom: 20px; text-align: center;
      border-left: 3px solid #C62828;
    }
    .info-banner {
      background: #E3F2FD; color: var(--aeroseal-steel-blue);
      padding: 12px 16px; border-radius: 6px;
      font-size: 13px; margin-bottom: 24px;
      border-left: 3px solid var(--aeroseal-sapphire);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <h1>Set Up Your Account</h1>
      <p>Welcome, {{ user.display_name }}</p>
    </div>

    <div class="info-banner">
      Choose a password to activate your account and start reviewing fuel reports.
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, msg in messages %}
          <div class="error-msg">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="/setup-account/{{ token }}">
      <div class="form-group">
        <label class="form-label" for="new_password">Password</label>
        <input class="form-input" type="password" id="new_password" name="new_password"
               autocomplete="new-password" autofocus required minlength="6"
               placeholder="At least 6 characters">
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm_password">Confirm Password</label>
        <input class="form-input" type="password" id="confirm_password" name="confirm_password"
               autocomplete="new-password" required>
      </div>
      <button class="btn-login" type="submit">Set Password & Sign In</button>
    </form>
  </div>
</body>
</html>
